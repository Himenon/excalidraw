name: Lint

on: pull_request

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: "package.json"

      - uses: pnpm/action-setup@v5.0.0

      - name: Install and lint
        run: |
          pnpm install
          pnpm test:other
          pnpm test:code
          pnpm test:typecheck
