name: Lint

on: pull_request

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 20.x

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install and lint
        run: |
          pnpm install
          pnpm test:other
          pnpm test:code
          pnpm test:typecheck
